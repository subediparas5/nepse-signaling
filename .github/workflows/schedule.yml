name: NEPSE Daily Signal

on:
  schedule:
    - cron: "0 9 * * 1-5"
      timezone: Asia/Kathmandu
  workflow_dispatch:
    inputs:
      telegram_send_to:
        description: "Telegram destination"
        type: choice
        required: false
        default: dm
        options:
          - group
          - dm
          - both

jobs:
  signal:
    runs-on: ubuntu-latest
    container: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    environment: Prod

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: uv sync

      - name: Run signal pipeline
        run: uv run src/main_signaling.py
        env:
          OPEN_AI_API_KEY: ${{ secrets.OPEN_AI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_DM_CHAT_ID: ${{ secrets.TELEGRAM_DM_CHAT_ID }}
          TELEGRAM_SEND_TO: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.telegram_send_to || 'both' }}
